<link rel="preconnect" href="https://fonts.googleapis.com" />

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script src="supabase-client.js"></script>
<script>
  // auth guard — รองรับทั้ง Supabase session และ demo localStorage
  (async function () {
    const hasMock = (() => { try { return !!JSON.parse(localStorage.getItem('videoup_user')); } catch { return false; } })();
    if (window.sb) {
      const { data } = await window.sb.auth.getSession();
      if (!data.session && !hasMock) window.location.replace('auth.html');
    } else if (!hasMock) {
      window.location.replace('auth.html');
    }
  })();
</script>
</head>

<div id="root"></div>
<div id="tweaks-root"></div>
